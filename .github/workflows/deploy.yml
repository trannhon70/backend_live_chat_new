name: Deploy NestJS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            echo "===== START ====="

            cd /www/wwwroot/backend_live_chat_new || exit 1

            git pull origin main

            node -v
            npm -v

            npm install
            npm run build

            pm2 list || true

            pm2 delete backend_live_chat_new || true
            npx pm2 start dist/main.js --name backend_live_chat_new

            pm2 save

            echo "===== DONE ====="