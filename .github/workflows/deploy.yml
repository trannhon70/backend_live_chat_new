name: Deploy Live chat

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            echo "===== START DEPLOY ====="
  
            # Move to project folder
            cd /www/wwwroot/backend_live_chat_new || exit 1

            # Pull latest code
            git pull origin main

            # Install + build
            npm install
            npm run build

            # stop old process
            /www/server/nodejs/v20.17.0/bin/pm2 delete backend_live_chat_new || true

            # start new process (CHỌN ĐÚNG FILE)
            /www/server/nodejs/v20.17.0/bin/pm2 start dist/src/main.js --name backend_live_chat_new

            /www/server/nodejs/v20.17.0/bin/pm2 save

            echo "===== DEPLOY DONE ====="